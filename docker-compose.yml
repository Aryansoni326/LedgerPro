version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ledgerpro_db
    environment:
      POSTGRES_DB: ${DB_NAME:-ledgerpro_db}
      POSTGRES_USER: ${DB_USER:-ledgerpro_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ledgerpro_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ledgerpro_user} -d ${DB_NAME:-ledgerpro_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ledgerpro_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./ledgerpro_backend
      dockerfile: Dockerfile
    container_name: ledgerpro_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./ledgerpro_backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./ledgerpro_backend
      dockerfile: Dockerfile
    container_name: ledgerpro_celery
    command: celery -A ledgerpro_backend worker --loglevel=info
    volumes:
      - ./ledgerpro_backend:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./ledgerpro_frontend
      dockerfile: Dockerfile
    container_name: ledgerpro_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./ledgerpro_frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
