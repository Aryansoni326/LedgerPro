<svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Page 1 (Back Sheet - Subdued Zinc) -->
  <rect x="4" y="4" width="20" height="26" rx="3.5" fill="#52525b" />

  <!-- Page 2 (Middle Sheet - Medium Zinc) -->
  <rect x="9" y="9" width="20" height="26" rx="3.5" fill="#71717a" />

  <!-- Page 3 (Front Sheet - High Contrast Black fill with White Border) -->
  <rect x="14" y="14" width="20" height="26" rx="3.5" fill="#09090b" stroke="#ffffff" stroke-width="1.5" />

  <!-- Ledger lines inside Page 3 -->
  <line x1="19" y1="20" x2="29" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="19" y1="25" x2="29" y2="25" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="19" y1="30" x2="25" y2="30" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
</svg>
